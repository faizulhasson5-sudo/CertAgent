<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CertAgent Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a3e, #2d1b69);
            padding: 20px 30px;
            border-bottom: 2px solid #6c3baa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { color: #00d4ff; font-size: 28px; }
        .header .status { color: #4ade80; font-size: 14px; }
        .header .status.error { color: #f87171; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: linear-gradient(145deg, #1a1a3e, #12122a);
            border: 1px solid #2d2d5e;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(108, 59, 170, 0.3);
        }
        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-card .label { color: #9ca3af; font-size: 14px; }
        .stat-card.total .number { color: #00d4ff; }
        .stat-card.completed .number { color: #4ade80; }
        .stat-card.in-progress .number { color: #fbbf24; }
        .stat-card.enrolled .number { color: #60a5fa; }
        .stat-card.discovered .number { color: #a78bfa; }
        .progress-bar-container {
            background: #1a1a3e;
            border: 1px solid #2d2d5e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .progress-bar-container h3 { margin-bottom: 15px; color: #00d4ff; }
        .progress-bar {
            height: 30px;
            background: #12122a;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6c3baa, #00d4ff);
            border-radius: 15px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            min-width: 50px;
        }
        .section {
            background: linear-gradient(145deg, #1a1a3e, #12122a);
            border: 1px solid #2d2d5e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .section h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2d2d5e;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #2d2d5e;
        }
        th {
            background: #12122a;
            color: #9ca3af;
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        tr:hover { background: rgba(108, 59, 170, 0.1); }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        .status-completed { background: #065f46; color: #4ade80; }
        .status-in_progress { background: #78350f; color: #fbbf24; }
        .status-enrolled { background: #1e3a5f; color: #60a5fa; }
        .status-discovered { background: #374151; color: #9ca3af; }
        .platform-badge {
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }
        .platform-freecodecamp { background: #0a0a23; color: #00d4ff; border: 1px solid #00d4ff; }
        .platform-kaggle { background: #1a0a2e; color: #a78bfa; border: 1px solid #a78bfa; }
        .platform-google { background: #1a2e1a; color: #4ade80; border: 1px solid #4ade80; }
        .platform-hubspot { background: #2e1a0a; color: #fb923c; border: 1px solid #fb923c; }
        .activity-log {
            max-height: 400px;
            overflow-y: auto;
        }
        .activity-item {
            padding: 10px 15px;
            border-left: 3px solid #6c3baa;
            margin-bottom: 10px;
            background: #12122a;
            border-radius: 0 8px 8px 0;
        }
        .activity-item .time { color: #6b7280; font-size: 12px; }
        .activity-item .action { color: #00d4ff; font-weight: 600; }
        .activity-item .details { color: #9ca3af; margin-top: 5px; }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .two-columns { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        .refresh-btn {
            background: linear-gradient(135deg, #6c3baa, #00d4ff);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .refresh-btn:hover { opacity: 0.85; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 15px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #12122a; }
        ::-webkit-scrollbar-thumb { background: #6c3baa; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>CertAgent Dashboard</h1>
            <div class="status" id="connection-status">Loading...</div>
        </div>
        <div>
            <span id="last-updated" style="margin-right: 15px; color: #9ca3af;"></span>
            <button class="refresh-btn" onclick="loadData()">Refresh</button>
        </div>
    </div>

    <div class="container">
        <div class="stats-grid" id="stats-grid"></div>

        <div class="progress-bar-container">
            <h3>Overall Progress</h3>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill">0%</div>
            </div>
        </div>

        <div class="section">
            <h2>Courses</h2>
            <div style="max-height: 500px; overflow-y: auto;">
                <table id="courses-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Status</th>
                            <th>Name</th>
                            <th>Platform</th>
                            <th>Progress</th>
                        </tr>
                    </thead>
                    <tbody id="courses-body"></tbody>
                </table>
            </div>
        </div>

        <div class="two-columns">
            <div class="section">
                <h2>Activity Log</h2>
                <div class="activity-log" id="activity-log"></div>
            </div>

            <div class="section">
                <h2>Quiz Attempts</h2>
                <div style="max-height: 400px; overflow-y: auto;">
                    <table id="quiz-table">
                        <thead>
                            <tr>
                                <th>Course</th>
                                <th>Question</th>
                                <th>AI Answer</th>
                                <th>Confidence</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="quiz-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let data = null;

        async function loadData() {
            try {
                const response = await fetch('data.json?' + Date.now());
                if (!response.ok) throw new Error('Failed to load data');
                data = await response.json();
                render();
                document.getElementById('connection-status').textContent = 'Connected';
                document.getElementById('connection-status').className = 'status';
                document.getElementById('last-updated').textContent = 'Updated: ' + data.last_updated;
            } catch (err) {
                document.getElementById('connection-status').textContent = 'Error: ' + err.message;
                document.getElementById('connection-status').className = 'status error';
            }
        }

        function render() {
            if (!data) return;
            renderStats();
            renderProgress();
            renderCourses();
            renderActivity();
            renderQuizzes();
        }

        function renderStats() {
            const stats = data.stats;
            const grid = document.getElementById('stats-grid');
            grid.innerHTML = `
                <div class="stat-card total">
                    <div class="number">${stats.total}</div>
                    <div class="label">Total Courses</div>
                </div>
                <div class="stat-card completed">
                    <div class="number">${stats.completed}</div>
                    <div class="label">Completed</div>
                </div>
                <div class="stat-card in-progress">
                    <div class="number">${stats.in_progress}</div>
                    <div class="label">In Progress</div>
                </div>
                <div class="stat-card enrolled">
                    <div class="number">${stats.enrolled}</div>
                    <div class="label">Enrolled</div>
                </div>
                <div class="stat-card discovered">
                    <div class="number">${stats.discovered}</div>
                    <div class="label">Discovered</div>
                </div>
            `;
        }

        function renderProgress() {
            const stats = data.stats;
            const pct = stats.total > 0 ? ((stats.completed / stats.total) * 100).toFixed(1) : 0;
            const fill = document.getElementById('progress-fill');
            fill.style.width = Math.max(pct, 2) + '%';
            fill.textContent = pct + '%';
        }

        function renderCourses() {
            const tbody = document.getElementById('courses-body');
            if (!data.courses || data.courses.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No courses yet</td></tr>';
                return;
            }
            tbody.innerHTML = data.courses.map((c, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td><span class="status-badge status-${c.status}">${c.status.replace('_', ' ')}</span></td>
                    <td><strong>${c.name}</strong></td>
                    <td><span class="platform-badge platform-${c.platform}">${c.platform}</span></td>
                    <td>${c.progress > 0 ? c.progress + '%' : '-'}</td>
                </tr>
            `).join('');
        }

        function renderActivity() {
            const log = document.getElementById('activity-log');
            if (!data.activity_log || data.activity_log.length === 0) {
                log.innerHTML = '<div class="empty-state"><div class="icon">📋</div>No activity yet</div>';
                return;
            }
            log.innerHTML = data.activity_log.map(a => `
                <div class="activity-item">
                    <div class="time">${a.created_at || 'N/A'}</div>
                    <div class="action">${a.action}</div>
                    ${a.details ? `<div class="details">${a.details}</div>` : ''}
                </div>
            `).join('');
        }

        function renderQuizzes() {
            const tbody = document.getElementById('quiz-body');
            if (!data.quiz_attempts || data.quiz_attempts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No quiz attempts yet</td></tr>';
                return;
            }
            tbody.innerHTML = data.quiz_attempts.map(q => `
                <tr>
                    <td>${q.course_name || q.course_id}</td>
                    <td>${(q.question || '').substring(0, 50)}...</td>
                    <td>${q.ai_answer || '-'}</td>
                    <td>${q.ai_confidence ? (q.ai_confidence * 100).toFixed(0) + '%' : '-'}</td>
                    <td><span class="status-badge status-${q.status === 'answered' ? 'completed' : 'discovered'}">${q.status}</span></td>
                </tr>
            `).join('');
        }

        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
